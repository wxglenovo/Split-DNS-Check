
name: Split & DNS Check

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
    - cron: "*/24 * * * *" # 每24分钟轮替分片
  workflow_dispatch:
    inputs:
      part:
        description: '手动验证指定分片 1~16'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: 1
      TOTAL_PARTS: 16

    steps:
      - name: ✅ 拉取代码库（浅克隆）
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: ✅ 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: ✅ 安装依赖
        run: pip install --upgrade requests dnspython

      - name: ✅ Git 配置
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "💻 当前 Git 配置："
          git config --global --list

      - name: ✅ 智能 Git 历史瘦身
        run: |
          set -euo pipefail
          echo "⏳ 测试克隆速度（--no-tags + 浅克隆）"
          START=$(date +%s)
          git clone --no-tags --depth=1 \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo || true
          END=$(date +%s)
          ELAPSED=$((END - START))
          echo "✅ 克隆耗时: ${ELAPSED}s"

          if (( ELAPSED <= 60 )); then
            echo "✅ 克隆速度良好 → 跳过 Git 历史瘦身"
            exit 0
          fi

          echo "⚠ 克隆耗时超过 60 秒 → 自动触发 Git 瘦身!"
          cd repo
          du -sh .git || true
          TS=$(date +"%Y%m%d-%H%M")
          TAG="auto-backup-$TS"
          BRANCH="backup-$TS"
          git tag "$TAG"
          git branch "$BRANCH"
          git push --atomic --force --thin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            "$TAG" "$BRANCH"
          NEW_TREE=$(git write-tree)
          NEW_COMMIT=$(echo "🧹 Repo auto-squash on $TS" | git commit-tree "$NEW_TREE")
          git reset --hard "$NEW_COMMIT"
          git push --force --thin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
          echo "✅ Git 历史瘦身完成! 备份 tag: $TAG 分支: $BRANCH"

      - name: ✅ 定时强制更新规则（每6小时）
        run: |
          BJ_TIME=$(date -u -d '+8 hour' +"%Y-%m-%d %H:%M")
          CURRENT_HOUR=$(date -u -d '+8 hour' +"%H")
          echo "🕒 当前北京时间: $BJ_TIME"
          if [[ "$CURRENT_HOUR" == "00" || "$CURRENT_HOUR" == "06" || "$CURRENT_HOUR" == "12" || "$CURRENT_HOUR" == "18" ]]; then
            echo "📥 开始强制更新规则..."
            python3 split_and_check_16.py --force-update
            echo "✅ 规则强制更新完成"
          else
            echo "ℹ️ 当前时间不满足 6 小时间隔，跳过强制更新"
          fi

      - name: ✅ 初始化 dist 文件夹和计数器 & retry_rules.txt
        run: |
          mkdir -p dist logs tmp
          echo "📁 确保 dist/logs/tmp 文件夹存在"
          if [ ! -f dist/delete_counter.json ]; then
            echo "{}" > dist/delete_counter.json
            echo "✅ 已创建 delete_counter.json"
          else
            echo "ℹ️ delete_counter.json 已存在"
          fi

          if [ ! -f dist/not_written_counter.json ]; then
            echo "{}" > dist/not_written_counter.json
            echo "✅ 已创建 not_written_counter.json"
          else
            echo "ℹ️ not_written_counter.json 已存在"
          fi

          if [ ! -f dist/retry_rules.txt ]; then
            touch dist/retry_rules.txt
            echo "✅ 已创建 retry_rules.txt"
          else
            echo "ℹ️ retry_rules.txt 已存在"
          fi

          echo "dist/retry_rules.txt 内容预览（前5行）:"
          head -n 5 dist/retry_rules.txt || echo "⚠ 文件为空"

      # 其余步骤保持原样（确保规则、DNS 验证、日志上传、提交等）
      - name: ✅ 确保规则文件与分片存在
        run: |
          if [ -f "merged_rules.txt" ] && [ -f "tmp/part_X.txt" ]; then
            echo "ℹ️ merged_rules.txt 和 tmp/part_X.txt 均已存在，无需拉取"
          else
            echo "⚠ 缺失规则文件，自动拉取"
            python3 split_and_check_16.py --force-update
          fi

      - name: ✅ 分片检测 & DNS 验证（固定80线程，每批540条）
        id: detect
        run: |
          LAST_PART_FILE="tmp/last_part.txt"
          PART_INPUT="${{ github.event.inputs.part }}"

          if [ -n "$PART_INPUT" ]; then
            PART="$PART_INPUT"
          else
            if [ -f "$LAST_PART_FILE" ]; then
              LAST_PART=$(cat "$LAST_PART_FILE")
              PART=$(( (LAST_PART % TOTAL_PARTS) + 1 ))
            else
              PART=1
            fi
          fi

          echo "$PART" > "$LAST_PART_FILE"
          echo "part=$PART" >> $GITHUB_OUTPUT
          echo "💻 本次处理分片: $PART"

          python3 split_and_check_16.py --part "$PART" | tee logs/split_check_part_${PART}.log || true

      - name: ✅ 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dns-log-part-${{ steps.detect.outputs.part }}
          path: logs/
          if-no-files-found: warn
          retention-days: 14

      - name: ✅ 提交并推送变更
        continue-on-error: true
        env:
          PART: ${{ steps.detect.outputs.part }}
        run: |
          set +e
          if [ -f logs/split_check_part_${PART}.log ]; then
            STATS=$(grep "COMMIT_STATS" logs/split_check_part_${PART}.log | tail -n1 | sed 's/COMMIT_STATS: //')
          else
            echo "ℹ️ 日志文件不存在"
            STATS="无日志"
          fi

          echo "📦 准备提交文件:"
          ls -l dist || echo "⚠ dist 不存在"

          git add tmp/last_part.txt dist/delete_counter.json dist/not_written_counter.json merged_rules.txt || true
          git add dist/retry_rules.txt 2>/dev/null || true
          git add dist/validated_part_*.txt 2>/dev/null || true
          git commit -m "🤖 分片 $PART | $STATS" || echo "ℹ️ 无变化，无需提交"
          git pull --rebase origin main || echo "⚠ pull失败（忽略）"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || echo "⚠ push失败（可能无变化）"
          set -e
